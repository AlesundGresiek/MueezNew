<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Surprise 💖</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#332d2f,#a64bf4);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Password Screen */
#lock{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

input{
padding:10px;
border-radius:20px;
border:none;
margin:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:25px;
cursor:pointer;
}

/* Love Section */
#loveSection{
display:none;
margin-top:100px;
position:relative;
height:200px;
}

#noBtn{
position:absolute;
}

/* Main */
#main{
display:none;
padding:10px;
}

h1{
font-size:1.8em;
margin-top:20px;
}

#text{
font-size:1.1em;
margin:15px;
line-height:1.5;
}

/* SLIDING SLIDESHOW */
.gallery{
position:relative;
width:80%;
max-width:400px;
height:250px;
margin:20px auto;
overflow:hidden;
border-radius:15px;
}

.gallery-track{
display:flex;
width:100%;
height:100%;
transition:transform 1s ease-in-out;
}

.gallery-track img{
flex:0 0 100%;
height:100%;
object-fit:cover;
}

/* Hearts */
.heart{
position:fixed;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lock">
<h2>Enter Password 🔐</h2>
<input type="password" id="pass">
<button onclick="check()">Open 💌</button>
</div>

<!-- LOVE BUTTONS -->
<div id="loveSection">
<h2>Do you love me? 😏</h2>
<button onclick="yesClick()">❤️ Yes</button>
<button id="noBtn" onmouseover="moveNo()">❌ No</button>
</div>

<!-- MAIN -->
<div id="main">
<h1>Eid Mubarak Areeba 💖</h1>
<p id="text"></p>

<div class="gallery">
<div class="gallery-track">
<img src="https://lh3.googleusercontent.com/d/1Yuu6C2OKaKzsFpnMkxri_6Y8UgcNvfNz">
<img src="https://lh3.googleusercontent.com/d/1LgcoCHP5UBRd4yK9q6vW9bcfhHh5-fEc">
<img src="https://lh3.googleusercontent.com/d/1hW-I3qAiun4uq4NX1qSEowYRMcC_SiC3">
<img src="https://lh3.googleusercontent.com/d/1mJi4QepZu3yf-AfW1gpcZ_L83GRhZS3Q">
</div>
</div>

</div>

<script>
// PASSWORD
function check(){
let p=document.getElementById("pass").value;
if(p==="areeba"){
document.getElementById("lock").style.display="none";
document.getElementById("loveSection").style.display="block";
}else{
alert("Wrong password");
}
}

// YES CLICK
function yesClick(){
document.getElementById("loveSection").style.display="none";
document.getElementById("main").style.display="block";
typeText();
startSlideshow();
hearts();
}

// MOVE NO BUTTON
function moveNo(){
let b=document.getElementById("noBtn");
b.style.left=Math.random()*70+"%";
b.style.top=Math.random()*150+"px";
}

// TEXT ANIMATION
let messages = [
"🌙 May Allah bless our love endlessly...",
"💖 You are my world, my heart, my everything...",
"🌸 I can't wait to spend forever with you...",
"✨ Eid Mubarak, my love!",
"💕Today is Eid",
"May your hina stain dark",
"🤞Your outfit looks beautiful", 
"📸And your pictures come out cute",
"I Love You So Much 💖"
];

let msgIndex = 0;
let charIndex = 0;

function typeText(){
if(msgIndex < messages.length){
let msg = messages[msgIndex];
if(charIndex < msg.length){
document.getElementById("text").innerHTML += msg.charAt(charIndex);
charIndex++;
setTimeout(typeText,40);
}else{
document.getElementById("text").innerHTML += "<br><br>";
msgIndex++;
charIndex = 0;
setTimeout(typeText,600);
}
}
}

// SLIDING SLIDESHOW
function startSlideshow(){
const track = document.querySelector(".gallery-track");
const slides = document.querySelectorAll(".gallery-track img");
let index = 0;

setInterval(()=>{
index = (index + 1) % slides.length;
track.style.transform = `translateX(-${index * 100}%)`;
}, 3000);
}

// HEARTS
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
},300);
}
</script>

</body>
</html>
